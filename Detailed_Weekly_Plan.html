<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detailed Weekly Execution Plan — AWS Infrastructure Modernisation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#EEF2F7;color:#1a1a1a;font-size:13px;min-width:960px}

/* ── Top bar ── */
.topbar{background:#0D2137;padding:0 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.brand{font-size:13px;font-weight:700;color:#A8DDB5;padding:13px 20px 13px 0;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap}
.phase-tabs{display:flex;gap:0}
.ptab{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);padding:13px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.ptab:hover{color:rgba(255,255,255,.8)}
.ptab.active{color:#fff;border-bottom-color:#3DB56C}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px}
.c-navy{background:#185FA5;color:#fff}
.c-green{background:#3DB56C;color:#fff}
.c-amber{background:#F59E0B;color:#fff}
.c-purple{background:#533AB7;color:#fff}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:calc(100vh - 46px)}

/* ── Sidebar ── */
.sidebar{background:#fff;border-right:0.5px solid #D3D1C7;padding:14px 0;position:sticky;top:46px;height:calc(100vh - 46px);overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#B4B2A9;padding:10px 16px 4px}
.sb-week{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.sb-week:hover{background:#F4F7F4}
.sb-week.active{background:#EEF2F7;border-left-color:#3DB56C}
.sb-week.active .sb-wlbl{color:#0D2137;font-weight:700}
.sb-wnum{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sb-wlbl{font-size:12px;color:#64748B}
.sb-wsub{font-size:10px;color:#B4B2A9;margin-top:1px}
.sb-bast{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-top:2px;display:inline-block}
.sb-progress{height:3px;background:#E8EDF2;border-radius:2px;margin:4px 16px 6px;overflow:hidden}
.sb-fill{height:100%;border-radius:2px;transition:width .4s ease}
.sb-done-count{font-size:10px;color:#B4B2A9;padding:0 16px 8px;text-align:right}

/* ── Main content ── */
.main{padding:20px;overflow-y:auto}
.wpage{display:none}
.wpage.active{display:block}

/* ── Week header ── */
.whdr{border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between}
.whdr-left h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:3px}
.whdr-left p{font-size:12px;color:rgba(255,255,255,.72);line-height:1.5}
.whdr-right{text-align:right}
.whdr-right .big-num{font-size:28px;font-weight:700;color:#fff}
.whdr-right small{display:block;font-size:10px;color:rgba(255,255,255,.6)}
.whdr-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.whdr-badge{font-size:10px;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;font-weight:600}

/* ── Summary row ── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.scard{background:#fff;border-radius:8px;border:0.5px solid #D3D1C7;padding:12px;text-align:center}
.scard-num{font-size:24px;font-weight:700;margin-bottom:2px}
.scard-lbl{font-size:10px;color:#64748B}

/* ── Prereq / objective blocks ── */
.prereq-block{border-left:3px solid #F59E0B;background:#FFFBF5;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:10px}
.prereq-block.blue{border-left-color:#185FA5;background:#EFF6FF}
.prereq-block.green{border-left-color:#3DB56C;background:#F0FBF7}
.prereq-block.red{border-left-color:#E74C3C;background:#FFF5F5}
.pb-title{font-size:11px;font-weight:700;color:#854F0B;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pb-title.blue{color:#185FA5}
.pb-title.green{color:#0F6E56}
.pb-title.red{color:#A32D2D}
.pb-item{font-size:11px;color:#633806;margin-bottom:3px;display:flex;gap:6px;line-height:1.5}
.pb-item.blue{color:#0C447C}
.pb-item.green{color:#085041}
.pb-item.red{color:#791F1F}
.pb-item::before{content:'→';flex-shrink:0}

/* ── Day table ── */
.day-table{background:#fff;border-radius:10px;border:0.5px solid #D3D1C7;overflow:hidden;margin-bottom:12px}
.day-hdr{background:#F4F7F4;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #E8EDF2;cursor:pointer}
.day-hdr:hover{background:#EEF2F7}
.day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-name{font-size:13px;font-weight:700;color:#0D2137;min-width:90px}
.day-focus{font-size:11px;color:#64748B;flex:1}
.day-meta{display:flex;gap:6px;align-items:center}
.day-hrs{font-size:11px;font-weight:600;color:#888780}
.day-chevron{font-size:11px;color:#B4B2A9;transition:transform .2s;margin-left:6px}
.day-open .day-chevron{transform:rotate(180deg)}
.day-body{display:none;padding:0}
.day-open .day-body{display:block}

/* ── Task rows ── */
.task-row{display:grid;grid-template-columns:36px 1fr 80px 80px 70px;align-items:start;padding:9px 16px;border-bottom:0.5px solid #F1EFE8;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#FAFCFA}
.task-check{width:18px;height:18px;border-radius:4px;border:1.5px solid #D3D1C7;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-check.done{background:#3DB56C;border-color:#3DB56C}
.task-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.task-main{display:flex;flex-direction:column;gap:3px}
.task-title{font-size:12px;color:#1a1a1a;line-height:1.45}
.task-title.done-txt{color:#B4B2A9;text-decoration:line-through}
.task-dep{font-size:10px;color:#B4B2A9}
.task-dep::before{content:'↳ Needs: ';font-style:italic}
.otag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;text-align:center;white-space:nowrap}
.ot-x{background:#E6F1FB;color:#185FA5}
.ot-c{background:#EAF3DE;color:#3B6D11}
.ot-b{background:#F1EFE8;color:#5F5E5A}
.ot-sa{background:#F5F3FF;color:#533AB7}
.ptag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;text-align:center;white-space:nowrap}
.pt-blocker{background:#FCEBEB;color:#A32D2D}
.pt-high{background:#FAEEDA;color:#854F0B}
.pt-norm{background:#F4F7F4;color:#5F5E5A}
.pt-review{background:#EAF3DE;color:#3B6D11}
.hrs-badge{font-size:10px;color:#888780;text-align:right;white-space:nowrap}

/* ── Section divider inside day ── */
.task-section{padding:6px 16px 3px;background:#F8FAFB;font-size:10px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid #F1EFE8}

/* ── BAST milestone banner ── */
.bast-banner{background:#0D2137;color:#fff;border-radius:8px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.bast-icon{font-size:28px}
.bast-info h3{font-size:14px;font-weight:700;color:#A8DDB5;margin-bottom:3px}
.bast-info p{font-size:11px;color:rgba(255,255,255,.7);line-height:1.6}
.bast-pct{font-size:32px;font-weight:700;color:#3DB56C;margin-left:auto;text-align:right}
.bast-pct small{display:block;font-size:10px;color:rgba(255,255,255,.5);font-weight:400}

/* ── Success criteria ── */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc-item{background:#F0FBF7;border:0.5px solid #5DCAA5;border-radius:6px;padding:9px 12px;display:flex;gap:8px;align-items:flex-start}
.sc-check{width:20px;height:20px;border-radius:50%;background:#3DB56C;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.sc-text{font-size:11px;color:#085041;line-height:1.5}
.sc-metric{font-size:10px;font-weight:700;color:#0F6E56;margin-top:2px}

/* ── Effort summary ── */
.effort-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.ef-item{background:#fff;border:0.5px solid #D3D1C7;border-radius:6px;padding:8px 14px;font-size:11px;display:flex;gap:8px;align-items:center}
.ef-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ef-lbl{color:#64748B}
.ef-val{font-weight:700;color:#0D2137}

/* ── Tooltip ── */
.tt{position:fixed;pointer-events:none;background:#0D2137;color:#fff;border-radius:7px;padding:8px 12px;font-size:11px;max-width:220px;z-index:99;opacity:0;transition:opacity .1s;line-height:1.6}
</style>
</head>
<body>

<div class="topbar">

  <!-- Main -->

// ══════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════
let currentPhase = 'm1';
let currentWeek = 1;
let taskStates = {}; // weekNum_dayIdx_taskIdx -> done/not

// ══════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════
function getWeekTasks(wn) {
  const w = WEEKS[wn];
  if (!w) return { total: 0, done: 0 };
  let total = 0, done = 0;
  w.days.forEach((d, di) => {
    d.tasks.forEach((t, ti) => {
      total++;
      if (taskStates[`${wn}_${di}_${ti}`]) done++;
    });
  });
  return { total, done };
}

function getAllProgress() {
  let total = 0, done = 0;
  Object.keys(WEEKS).forEach(wn => {
    const r = getWeekTasks(parseInt(wn));
    total += r.total; done += r.done;
  });
  return { total, done };
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const phases = ['m1', 'm2', 'm3'];
  const phaseLabels = { m1: 'Month 1 — Foundation', m2: 'Month 2 — Build', m3: 'Month 3 — Deliver' };
  const phaseColors = { m1: '#0D2137', m2: '#0F6E56', m3: '#533AB7' };
  const bastColors = { m1: '#0D2137', m2: '#0F6E56', m3: '#533AB7' };

  phases.forEach(ph => {
    const phaseDiv = document.createElement('div');
    const lbl = document.createElement('div');
    lbl.className = 'sb-section';
    lbl.textContent = phaseLabels[ph];
    phaseDiv.appendChild(lbl);

    PHASES[ph].weeks.forEach(wn => {
      const w = WEEKS[wn];
      const { total, done } = getWeekTasks(wn);
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      const isActive = wn === currentWeek;
      const div = document.createElement('div');
      div.className = 'sb-week' + (isActive ? ' active' : '');
      div.onclick = () => showWeek(wn);
      div.innerHTML = `
        <div class="sb-wnum" style="background:${phaseColors[ph]}">${wn}</div>
        <div style="flex:1;min-width:0">
          <div class="sb-wlbl">${w.title.split(' — ').slice(1).join(' — ').substring(0, 28)}${w.title.length > 38 ? '…' : ''}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
            <div style="height:3px;flex:1;background:#E8EDF2;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${phaseColors[ph]};border-radius:2px"></div></div>
            <div style="font-size:9px;color:#B4B2A9;white-space:nowrap">${done}/${total}</div>
          </div>
        </div>
      `;
      phaseDiv.appendChild(div);
    });

    sb.appendChild(phaseDiv);
  });
}

function renderWeek(wn) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const w = WEEKS[wn];
  if (!w) return;
  const ph = PHASES[w.phase];
  const phColor = { m1: '#0D2137', m2: '#0F6E56', m3: '#533AB7' }[w.phase];

  // BAST banner if applicable

    const b = w.bastMilestone;
    const bb = document.createElement('div');
    bb.className = 'bast-banner';
    bb.innerHTML = `
      <div class="bast-icon">📋</div>
      <div class="bast-info">
        <h3>${b.label} — BAST Sign-off This Week</h3>
        <p>${b.items.map(i => '✓ ' + i).join('&nbsp;&nbsp;')}</p>
      </div>
      <div class="bast-pct">${b.pct}<small>of contract value</small></div>
    `;
    main.appendChild(bb);
  }

  // Week header
  const hdr = document.createElement('div');
  hdr.className = 'whdr';
  hdr.style.background = `linear-gradient(135deg, ${phColor} 0%, ${phColor}CC 100%)`;
  const { total, done } = getWeekTasks(wn);
  const totalHrs = w.days.reduce((s, d) => s + d.hours, 0);
  hdr.innerHTML = `
    <div class="whdr-left">
      <h2>${w.title}</h2>
      <p style="max-width:700px">${w.focus}</p>
      <div class="whdr-badges">
        <span class="whdr-badge">${ph.label}</span>
        <span class="whdr-badge">Week ${wn} of 12</span>
        <span class="whdr-badge">${total} tasks</span>
        <span class="whdr-badge">${totalHrs} hrs effort</span>
      </div>
    </div>
    <div class="whdr-right">
      <div class="big-num">${done}/${total}</div>
      <small>tasks done</small>
    </div>
  `;
  main.appendChild(hdr);

  // Two-column top: prereqs + objectives
  const topGrid = document.createElement('div');
  topGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px';

  // Prerequisites
  const prereqCard = document.createElement('div');
  prereqCard.style.cssText = 'background:#fff;border-radius:10px;border:0.5px solid #D3D1C7;padding:14px';
  prereqCard.innerHTML = `<div style="font-size:12px;font-weight:700;color:#854F0B;margin-bottom:8px;display:flex;align-items:center;gap:5px">⚡ Prerequisites — Must exist before this week starts</div>`;
  w.prereqs.forEach(p => {
    const pb = document.createElement('div');
    pb.className = 'prereq-block'; pb.style.marginBottom = '5px';
    pb.innerHTML = `<div class="pb-item">${p}</div>`;
    prereqCard.appendChild(pb);
  });
  topGrid.appendChild(prereqCard);

  // Objectives + success criteria
  const objCard = document.createElement('div');
  objCard.style.cssText = 'background:#fff;border-radius:10px;border:0.5px solid #D3D1C7;padding:14px';
  objCard.innerHTML = `<div style="font-size:12px;font-weight:700;color:#0F6E56;margin-bottom:8px">✦ Week Objectives</div>`;
  w.objectives.forEach(o => {
    const od = document.createElement('div');
    od.style.cssText = 'font-size:11px;color:#085041;margin-bottom:4px;display:flex;gap:6px';
    od.innerHTML = `<span style="color:#3DB56C;flex-shrink:0">→</span>${o}`;
    objCard.appendChild(od);
  });
  if (w.success && w.success.length > 0) {
    const sl = document.createElement('div');
    sl.style.cssText = 'font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px';
    sl.textContent = 'Week success criteria';
    objCard.appendChild(sl);
    w.success.forEach(sc => {
      const si = document.createElement('div');
      si.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;padding:6px;background:#F0FBF7;border-radius:5px;border:0.5px solid #5DCAA5';
      si.innerHTML = `<div style="width:18px;height:18px;border-radius:50%;background:#3DB56C;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">✓</div><div><div style="font-size:11px;color:#085041">${sc.text}</div><div style="font-size:10px;font-weight:700;color:#0F6E56;margin-top:2px">${sc.metric}</div></div>`;
      objCard.appendChild(si);
    });
  }
  topGrid.appendChild(objCard);
  main.appendChild(topGrid);

  // Day tables
  const OWNER_LABELS = { x: 'Xtremax', c: 'Customer', b: 'Both', sa: 'SA' };
  const OWNER_CLASSES = { x: 'ot-x', c: 'ot-c', b: 'ot-b', sa: 'ot-sa' };
  const PRIO_LABELS = { blocker: 'BLOCKER', high: 'HIGH', norm: '', review: 'REVIEW' };
  const PRIO_CLASSES = { blocker: 'pt-blocker', high: 'pt-high', norm: 'pt-norm', review: 'pt-review' };
  const DAY_COLORS = ['#185FA5', '#3B6D11', '#533AB7', '#854F0B', '#A32D2D'];

  w.days.forEach((day, di) => {
    const dt = document.createElement('div');
    dt.className = 'day-table';
    dt.id = `day-${wn}-${di}`;

    const { total: dtotal, done: ddone } = (() => {
      let t = 0, d2 = 0;
      day.tasks.forEach((_, ti) => { t++; if (taskStates[`${wn}_${di}_${ti}`]) d2++; });
      return { total: t, done: d2 };
    })();

    const hdrEl = document.createElement('div');
    hdrEl.className = 'day-hdr';
    hdrEl.onclick = () => toggleDay(wn, di);
    hdrEl.innerHTML = `
      <div class="day-dot" style="background:${DAY_COLORS[di]}"></div>
      <div class="day-name">${day.name}</div>
      <div class="day-focus">${day.focus}</div>
      <div class="day-meta">
        <span style="font-size:10px;padding:2px 6px;border-radius:3px;background:#F0FBF7;color:#0F6E56;font-weight:700">${ddone}/${dtotal}</span>
        <span class="day-hrs">${day.hours}h</span>
      </div>
      <span class="day-chevron">▼</span>
    `;
    dt.appendChild(hdrEl);

    const body = document.createElement('div');
    body.className = 'day-body';
    day.tasks.forEach((task, ti) => {
      const isDone = !!taskStates[`${wn}_${di}_${ti}`];
      const tr = document.createElement('div');
      tr.className = 'task-row';
      const pLabel = PRIO_LABELS[task.priority];
      tr.innerHTML = `
        <div class="task-check${isDone ? ' done' : ''}" onclick="toggleTask(${wn},${di},${ti},this)"></div>
        <div class="task-main">
          <div class="task-title${isDone ? ' done-txt' : ''}">${task.title}</div>
          ${task.dep ? `<div class="task-dep">${task.dep}</div>` : ''}
        </div>
        <span class="otag ${OWNER_CLASSES[task.owner]}">${OWNER_LABELS[task.owner]}</span>
        ${pLabel ? `<span class="ptag ${PRIO_CLASSES[task.priority]}">${pLabel}</span>` : '<span></span>'}
        <div class="hrs-badge">${task.hrs}</div>
      `;
      body.appendChild(tr);
    });
    dt.appendChild(body);
    main.appendChild(dt);
  });

  // Scroll to top
  main.scrollTop = 0;
}

function toggleDay(wn, di) {
  const el = document.getElementById(`day-${wn}-${di}`);
  if (el) el.classList.toggle('day-open');
}

function toggleTask(wn, di, ti, el) {
  const key = `${wn}_${di}_${ti}`;
  taskStates[key] = !taskStates[key];
  el.classList.toggle('done');
  const txt = el.closest('.task-row').querySelector('.task-title');
  if (txt) txt.classList.toggle('done-txt');
  renderSidebar();
  updateGlobalProgress();
}

function updateGlobalProgress() {
  const { total, done } = getAllProgress();
  document.getElementById('global-progress').textContent = `${done} / ${total} tasks done`;
}

function showWeek(wn) {
  currentWeek = wn;
  // Find phase
  Object.keys(PHASES).forEach(ph => {
    if (PHASES[ph].weeks.includes(wn)) currentPhase = ph;
  });
  renderSidebar();
  renderWeek(wn);
  updateGlobalProgress();
}

function showPhase(ph) {
  currentPhase = ph;
  document.querySelectorAll('.ptab').forEach((t, i) => {
    t.classList.toggle('active', ['m1','m2','m3'][i] === ph);
  });
  showWeek(PHASES[ph].weeks[0]);
}

setTimeout(() => {
