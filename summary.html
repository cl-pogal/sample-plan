<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meeting Summary — AWS Infrastructure Modernisation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#EEF2F7;color:#1a1a1a;font-size:13px}

/* ── Top bar ── */
.topbar{background:#0D2137;padding:0 24px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.brand{font-size:14px;font-weight:700;color:#A8DDB5;padding-right:20px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap}
.brand small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.45);margin-top:1px}
.chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;white-space:nowrap}
.c-green{background:#3DB56C;color:#fff}.c-amber{background:#F59E0B;color:#fff}
.c-navy{background:#185FA5;color:#fff}.c-purple{background:#533AB7;color:#fff}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.current-week-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:4px;background:rgba(61,181,108,.2);color:#A8DDB5;border:1px solid rgba(61,181,108,.3)}

/* ── Page layout ── */
.page{max-width:1160px;margin:0 auto;padding:24px 20px}

/* ── Controls ── */
.controls{background:#fff;border-radius:10px;border:0.5px solid #D3D1C7;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-label{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.week-btns{display:flex;gap:4px;flex-wrap:wrap}
.wbtn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1.5px solid #E8EDF2;cursor:pointer;background:#fff;color:#64748B;transition:all .12s;white-space:nowrap}
.wbtn:hover{border-color:#0D2137;color:#0D2137}
.wbtn.selected{background:#0D2137;color:#fff;border-color:#0D2137}
.wbtn.past{border-color:#D3D1C7;color:#888780}
.wbtn.current{border-color:#3DB56C;color:#3DB56C;background:#F0FBF7}
.wbtn.current.selected{background:#3DB56C;color:#fff}
.sep{width:1px;height:28px;background:#E8EDF2}
.view-btns{display:flex;gap:4px}
.vbtn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1.5px solid #E8EDF2;cursor:pointer;background:#fff;color:#64748B;transition:all .12s}
.vbtn:hover{border-color:#0D2137;color:#0D2137}
.vbtn.active{background:#533AB7;color:#fff;border-color:#533AB7}
.ctrl-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.print-btn{font-size:11px;font-weight:600;padding:5px 14px;border-radius:6px;border:1.5px solid #D3D1C7;cursor:pointer;background:#fff;color:#64748B;display:flex;align-items:center;gap:5px}
.print-btn:hover{background:#0D2137;color:#fff;border-color:#0D2137}

/* ── Single Week View ── */
.meeting-card{background:#fff;border-radius:12px;border:0.5px solid #D3D1C7;overflow:hidden;margin-bottom:20px}

/* Phase banner */
.phase-banner{padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.phase-banner h2{font-size:20px;font-weight:700;color:#fff}
.phase-banner .sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:3px}
.bast-pill{font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)}

/* Sections inside meeting card */
.mc-body{padding:0}
.mc-section{padding:16px 20px;border-bottom:0.5px solid #F1EFE8}
.mc-section:last-child{border-bottom:none}
.mc-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mc-sec-icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* Focus statement */
.focus-box{background:#F4F7F4;border-radius:7px;padding:12px 14px;border-left:3px solid;font-size:12px;line-height:1.7;color:#1a1a1a}

/* Key activities table */
.activities-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.day-card{border-radius:7px;border:0.5px solid #E8EDF2;overflow:hidden}
.day-card-hdr{padding:7px 10px;font-size:10px;font-weight:700;color:#fff;text-align:center}
.day-card-body{padding:8px 10px;font-size:11px;color:#444;line-height:1.6;background:#fff;min-height:60px}
.day-activity{display:flex;gap:5px;margin-bottom:4px;align-items:flex-start;font-size:11px}
.day-activity::before{content:'·';color:#B4B2A9;flex-shrink:0;margin-top:1px}

/* Objectives */
.obj-list{display:flex;flex-direction:column;gap:6px}
.obj-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:#F4F7F4;border-radius:6px}
.obj-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.obj-text{font-size:12px;color:#1a1a1a;line-height:1.5;flex:1}

/* Success criteria */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc-item{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:6px;border:0.5px solid}
.sc-check-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.sc-main{flex:1}
.sc-text{font-size:11px;line-height:1.5}
.sc-metric{font-size:10px;font-weight:700;margin-top:3px;padding:1px 6px;border-radius:3px;display:inline-block}

/* Prereqs */
.prereq-list{display:flex;flex-direction:column;gap:5px}
.prereq-item{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;background:#FFFBF5;border-radius:6px;border:0.5px solid #FAC775;font-size:11px;color:#633806;line-height:1.5}
.prereq-item::before{content:'⚡';flex-shrink:0}

/* BAST milestone */
.bast-box{background:#0D2137;border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:16px}
.bast-pct{font-size:32px;font-weight:700;color:#3DB56C;flex-shrink:0}
.bast-info h4{font-size:13px;font-weight:700;color:#A8DDB5;margin-bottom:6px}
.bast-deliverable{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:3px;display:flex;align-items:flex-start;gap:6px}
.bast-deliverable::before{content:'✓';color:#3DB56C;flex-shrink:0}

/* ── Timeline view (all 12 weeks) ── */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-phase-hdr{padding:10px 18px;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.07em;border-radius:8px 8px 0 0;margin-bottom:0}
.tl-row{display:grid;grid-template-columns:60px 1fr 2.5fr 1fr;gap:0;border-bottom:0.5px solid #F1EFE8;background:#fff;cursor:pointer;transition:background .1s}
.tl-row:hover{background:#F8FAFC}
.tl-row.tl-current{background:#F0FBF7}
.tl-row.tl-past{opacity:.75}
.tl-row.tl-bast .tl-week{font-weight:700}
.tl-cell{padding:10px 14px;font-size:12px;align-self:stretch;display:flex;align-items:flex-start;flex-direction:column;justify-content:center}
.tl-week{font-size:13px;font-weight:700;color:#0D2137;display:flex;align-items:center;gap:5px}
.tl-focus{font-size:12px;color:#1a1a1a;font-weight:600;margin-bottom:3px}
.tl-sub{font-size:11px;color:#64748B;line-height:1.5}
.tl-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;align-self:flex-start;margin-top:2px}
.tl-bast-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;white-space:nowrap}
.tl-phase-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;color:#fff;align-self:flex-start;margin-bottom:4px}
.tl-hdr-row{display:grid;grid-template-columns:60px 1fr 2.5fr 1fr;gap:0;background:#F4F7F4;border-bottom:0.5px solid #E8EDF2}
.tl-hdr-cell{padding:8px 14px;font-size:10px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em}
.tl-group{background:#fff;border-radius:10px;border:0.5px solid #D3D1C7;overflow:hidden;margin-bottom:14px}

/* ── Status chips ── */
.status-planned{background:#F4F7F4;color:#64748B}
.status-current{background:#EAF3DE;color:#3B6D11}
.status-past{background:#E6F1FB;color:#185FA5}
.status-bast{background:#0D2137;color:#A8DDB5}

/* ── Print styles ── */
@media print {
  body{background:#fff;font-size:11px}
  .topbar,.controls,.print-btn{display:none!important}
  .page{padding:0;max-width:100%}
  .meeting-card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:16px}
  .activities-grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>

// ── State ──────────────────────────────────────────────────────────────
let selectedWeek = 1;
let currentView = 'single';
// Load stored current week from localStorage or default to 1
try {
  const stored = localStorage.getItem('XTRM_CURRENT_WEEK');
  if (stored) selectedWeek = parseInt(stored);
} catch(e){}

// ── Helpers ────────────────────────────────────────────────────────────
function phaseColor(p){ return PHASE_COLORS[p]; }
function phaseLabel(p){ return PHASE_LABELS[p]; }

function setCurrentWeek(wn) {
  selectedWeek = wn;
  try { localStorage.setItem('XTRM_CURRENT_WEEK', wn); } catch(e){}
  document.getElementById('current-week-indicator').textContent = `Week ${wn} of 12 selected`;
  renderWeekBtns();
  if (currentView === 'single') renderSingle(wn);
}

// ── Week buttons ───────────────────────────────────────────────────────
function renderWeekBtns() {
  const container = document.getElementById('week-btns');
  container.innerHTML = '';
  WEEKS.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'wbtn' +
      (w.week === selectedWeek ? ' selected' : '') ;
    if (w.bast) btn.style.borderColor = phaseColor(w.phase);
    btn.textContent = `W${w.week}${w.bast ? ' ★' : ''}`;
    btn.title = w.title + (w.bast ? ` · ${w.bast.label}` : '');
    btn.onclick = () => setCurrentWeek(w.week);
    container.appendChild(btn);
  });
}

// ── Single week render ─────────────────────────────────────────────────

        <div class="mc-sec-title" style="color:#854F0B">
          <div class="mc-sec-icon" style="background:#FAEEDA;color:#854F0B">⚡</div>

          ${w.prereqs.map(p=>`<div class="prereq-item">${p}</div>`).join('')}

  // Day-by-day activities

      <div class="mc-section">
        <div class="mc-sec-title" style="color:${col}">
          <div class="mc-sec-icon" style="background:${col}20;color:${col}">📅</div>

  w.dayFocus.forEach((d, di) => {
    const dayColors = ['#0D2137','#0F6E56','#533AB7','#854F0B','#A32D2D'];

              ${d.act.map(a=>`<div class="day-activity">${a}</div>`).join('')}
            </div>
          </div>`;
  });
  html += `</div></div>`;

  // Objectives
  html += `
      <div class="mc-section">
        <div class="mc-sec-title" style="color:${col}">
          <div class="mc-sec-icon" style="background:${col}20;color:${col}">🎯</div>

        <div class="obj-list">
          ${w.objectives.map((o,i)=>`
          <div class="obj-item">

      </div>`;

  // Success criteria
  html += `
      <div class="mc-section">
        <div class="mc-sec-title" style="color:#0F6E56">
          <div class="mc-sec-icon" style="background:#E1F5EE;color:#0F6E56">✓</div>
          SUCCESS CRITERIA — How we know this week succeeded
        </div>
        <div class="sc-grid">`;
  w.success.forEach(s => {
    html += `
          <div class="sc-item" style="background:#F0FBF7;border-color:#5DCAA5">
            <div class="sc-check-icon">✅</div>
            <div class="sc-main">
              <div class="sc-text">${s.text}</div>
              <div class="sc-metric" style="background:#E1F5EE;color:#0F6E56">${s.metric}</div>

          </div>`;
  });
  html += `</div></div>`;

  // Navigation arrows
  html += `
      <div class="mc-section" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          ${wn > 1 ? `<button onclick="setCurrentWeek(${wn-1})" style="font-size:12px;font-weight:600;padding:7px 16px;border-radius:6px;border:1.5px solid #D3D1C7;cursor:pointer;background:#fff;color:#0D2137">← Week ${wn-1}</button>` : '<span></span>'}

        </div>
      </div>`;

  html += `</div></div>`;
  container.innerHTML = html;
}

// ── All weeks timeline render ──────────────────────────────────────────

  const phaseWeeks = { m1:[1,2,3,4], m2:[5,6,7,8], m3:[9,10,11,12] };

  phases.forEach(ph => {
    const col = phaseColor(ph);
    html += `
    <div class="tl-group">
      <div class="tl-phase-hdr" style="background:${col}">${phaseLabel(ph)}</div>
      <div class="tl-hdr-row">
        <div class="tl-hdr-cell">Week</div>
        <div class="tl-hdr-cell">Title</div>
        <div class="tl-hdr-cell">Day-by-day focus</div>
        <div class="tl-hdr-cell">Key Outputs</div>
      </div>`;

    phaseWeeks[ph].forEach(wn => {
      const w = WEEKS[wn - 1];
      const isSel = wn === selectedWeek;
      html += `
      <div class="tl-row ${isSel ? 'tl-current' : ''} ${w.bast ? 'tl-bast' : ''}" onclick="setCurrentWeek(${wn}); setView('single')">
        <div class="tl-cell">
          <div class="tl-week">
            <span style="width:28px;height:28px;border-radius:50%;background:${col};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${wn}</span>
          </div>
          ${w.bast ? `<div class="tl-bast-badge" style="background:${col};margin-top:5px">${w.bast.label}</div>` : ''}
          ${isSel ? `<div style="font-size:10px;color:#3B6D11;font-weight:700;margin-top:4px">● Selected</div>` : ''}
        </div>
        <div class="tl-cell">
          <div class="tl-focus">Week ${wn} — ${w.title.replace(/Week \d+ — /, '')}</div>
          <div class="tl-sub" style="margin-top:4px;font-size:10px;color:#888780">${w.effort}</div>
        </div>
        <div class="tl-cell">
          ${w.dayFocus.map(d=>`<div style="font-size:11px;color:#444;margin-bottom:2px"><span style="font-weight:700;color:${col};min-width:28px;display:inline-block">${d.day}</span> ${d.act[0]}</div>`).join('')}
        </div>
        <div class="tl-cell">
          ${w.success.map(s=>`<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:5px;font-size:11px"><span style="color:#3DB56C;flex-shrink:0">✓</span><span>${s.text} <span style="font-weight:700;color:${col}">(${s.metric})</span></span></div>`).join('')}
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

// ── View toggle ────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('view-single').style.display = v === 'single' ? 'block' : 'none';
  document.getElementById('view-all').style.display    = v === 'all'    ? 'block' : 'none';
  document.getElementById('vbtn-single').className = 'vbtn' + (v==='single' ? ' active' : '');
  document.getElementById('vbtn-all').className    = 'vbtn' + (v==='all'    ? ' active' : '');
  if (v === 'all') renderAll();
}

// ── INIT ──────────────────────────────────────────────────────────────

document.getElementById('current-week-indicator').textContent = `Week ${selectedWeek} of 12 selected`;
